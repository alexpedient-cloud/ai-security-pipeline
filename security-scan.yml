name: AI Security Scan Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          pip install bandit semgrep pylint safety

      - name: Run Bandit
        run: bandit -r .

      - name: Run Semgrep
        run: semgrep --config=auto

      - name: Run PyLint
        run: pylint training_pipeline.py || true

      - name: Run Safety
        run: safety check || true